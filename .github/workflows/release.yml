name: release-msbuild

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      SOLUTION_FILE: StarlightGUI.sln
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "${{ env.SOLUTION_FILE }}"

      - name: Build
        run: msbuild "${{ env.SOLUTION_FILE }}" /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.BUILD_PLATFORM }}

      - name: Collect build output
        shell: pwsh
        run: |
          $releaseDirCandidates = @(
            "x64/Release",
            "StarlightGUI/x64/Release"
          )

          $releaseDir = $releaseDirCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $releaseDir) {
            throw "Release output directory not found. Tried: $($releaseDirCandidates -join ', ')"
          }

          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          Copy-Item "$releaseDir/*" artifact -Recurse -Force

          if (-not (Test-Path "artifact/StarlightGUI.exe")) {
            Write-Warning "StarlightGUI.exe not found at artifact root; continuing with packaged files."
          }

      - name: Pack release zip + checksum
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "StarlightGUI-$tag-win-x64.zip"
          Compress-Archive -Path artifact\* -DestinationPath $zipName -Force

          $checksumName = "$zipName.sha256"
          $hash = (Get-FileHash -Path $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath $checksumName -Encoding ascii

          "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          "CHECKSUM_NAME=$checksumName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-pre') }}
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.CHECKSUM_NAME }}
